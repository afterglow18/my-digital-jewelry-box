kind = "web"
previewPath = "/video-promo"
title = "Promo Video"
version = "1.0.0"
id = "artifacts/video-promo"
router = "path"

[[services]]
name = "web"
paths = [ "/video-promo" ]
localPort = 21372

[services.development]
run = "pnpm --filter video-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "video-promo", "run", "build" ]
serve = "static"
publicDir = "artifacts/video-promo/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21372"
BASE_PATH = "/video-promo"
